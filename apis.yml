aid: terrascope
name: Terrascope
description: >-
  Terrascope is a Singapore-headquartered climate-tech and sustainability
  software company building an enterprise carbon measurement, management,
  and decarbonization platform. Launched in 2022 after being incubated and
  spun out of Olam Group (a Temasek-linked Singapore agribusiness), and
  led by former Google and AWS executive Felipe Daguila, Terrascope serves
  large food, agriculture, retail, and manufacturing enterprises that need
  to quantify Scope 1, 2, and 3 emissions across their operations,
  products, and supply chains. The platform centers on four core modules:
  Corporate Carbon Footprint (CCF) for organization-level inventories,
  Product Carbon Footprint (PCF) for product-level lifecycle emissions,
  Supplier Engagement for Scope 3 primary-data collection, and Climate
  Reporting for audit-ready disclosure. Terrascope's differentiator is its
  AI-assisted data ingestion layer (built on Amazon Bedrock) that reduces
  measurement cycles by roughly 80% versus manual baselines, intelligent
  emissions factor matching with FLAG (Forestry, Land, and Agriculture)
  breakdowns, data gap-filling claiming 92% accuracy versus supplier data,
  and a curated library of over 20,000 decarbonization best practices used
  to power what-if scenario modeling and ROI-ranked recommendations. The
  platform supports the GHG Protocol (including Land Sector and Removals
  guidance), SBTi FLAG, CDP (Terrascope is a CDP Gold Accredited software
  provider), TCFD, California SB253, and Australia's S2 climate disclosure
  regimes. Notable customers include Kellanova, Princes Group, iNova
  Pharmaceuticals, Mandai Wildlife Group, Olam Food Ingredients, Tetra
  Pak, Mitsubishi, Japan Tobacco, and Kagome. Investors include Olam
  Group and Plug and Play Tech Center. Terrascope is delivered as a
  closed enterprise SaaS — there is no publicly documented developer API,
  OpenAPI specification, SDK, CLI, or open-source release. The
  github.com/terrascope organization exists but has no public
  repositories, and docs.terrascope.com is not publicly resolvable.
  Integration with customer ERP, procurement, and energy systems is
  handled through bespoke implementation engagements rather than
  self-serve developer onboarding.
